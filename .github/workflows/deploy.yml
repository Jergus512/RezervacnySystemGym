name: Deploy SuperGym to Websupport

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.FTP_HOST }}" ]; then
            echo "ERROR: FTP_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USER }}" ]; then
            echo "ERROR: FTP_USER secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_PASS }}" ]; then
            echo "ERROR: FTP_PASS secret is not set"
            exit 1
          fi
          echo "All required secrets are configured"

      - name: Deploy app to Websupport without touching DB
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PORT: ${{ secrets.FTP_PORT || 22 }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          # Export variables so they are available in the script
          export FTP_HOST="$FTP_HOST"
          export FTP_USER="$FTP_USER"
          export FTP_PASS="$FTP_PASS"
          export FTP_PORT="${FTP_PORT:-22}"
          export FTP_PATH="$FTP_PATH"
          
          # Debug: print values (without password for security)
          echo "DEBUG - FTP_HOST: $FTP_HOST"
          echo "DEBUG - FTP_PORT: $FTP_PORT"
          echo "DEBUG - FTP_PATH: $FTP_PATH"
          
          # Create lftp script using envsubst to substitute variables
          cat > /tmp/deploy.lftp << 'SCRIPT'
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:timeout 30
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 15
          
          open sftp://${FTP_USER}:${FTP_PASS}@${FTP_HOST}:${FTP_PORT}
          
          mirror -R ./app/ ${FTP_PATH} \
            --delete \
            --verbose \
            --parallel=2 \
            --no-perms \
            --exclude-glob .env \
            --exclude-glob .env.* \
            --exclude-glob node_modules \
            --exclude-glob node_modules/** \
            --exclude-glob vendor \
            --exclude-glob vendor/** \
            --exclude-glob .git* \
            --exclude-glob .github \
            --exclude-glob .github/** \
            --exclude-glob .idea \
            --exclude-glob .idea/** \
            --exclude-glob database/database.sqlite \
            --exclude-glob storage \
            --exclude-glob storage/** \
            --exclude-glob .DS_Store
          
          quit
          SCRIPT
          
          # Use envsubst to replace variables in the script
          envsubst < /tmp/deploy.lftp > /tmp/deploy_expanded.lftp
          
          # Debug: show first 30 lines of expanded script (sanitized)
          echo "DEBUG - First lines of expanded script:"
          head -5 /tmp/deploy_expanded.lftp | sed 's/:[^@]*@/:***PASSWORD***@/g'
          
          # Run lftp with the expanded script
          lftp -f /tmp/deploy_expanded.lftp || {
            echo "Deployment failed with lftp"
            exit 1
          }
          
          echo "Deployment completed successfully"