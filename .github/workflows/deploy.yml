name: Deploy SuperGym to Websupport

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy app to Websupport without touching DB
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" sftp://$FTP_HOST:$FTP_PORT <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 10

          mirror -R ./app/ "$FTP_PATH" \
            --delete \
            --verbose \
            --parallel=2 \
            --no-perms \
            --exclude-glob .env \
            --exclude-glob .env.* \
            --exclude-glob node_modules \
            --exclude-glob node_modules/** \
            --exclude-glob vendor \
            --exclude-glob vendor/** \
            --exclude-glob .git* \
            --exclude-glob .github \
            --exclude-glob .github/** \
            --exclude-glob .idea \
            --exclude-glob .idea/** \
            --exclude-glob database/database.sqlite \
            --exclude-glob storage \
            --exclude-glob storage/**

          bye
          EOF